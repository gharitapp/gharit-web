<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download GHAR!T App — Premium Laundry Delivered</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============================================
           TYPOGRAPHY & VARIABLES (MATCHING MAIN SITE)
           ============================================ */
      @font-face {
        font-family: "SohneSchmal";
        src: url("https://fonts.cdnfonts.com/s/15011/SohneSchmal-Buch.woff")
          format("woff");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --primary: #538994;
        --primary-dark: #3d6b75;
        --primary-light: #6aa3b0;
        --primary-glow: rgba(83, 137, 148, 0.3);
        --black: #0a0a0a;
        --white: #ffffff;
        --gray-50: #fafafa;
        --gray-100: #f5f5f5;
        --gray-200: #e5e5e5;
        --gray-400: #a3a3a3;
        --gray-600: #525252;
        --gray-800: #262626;
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          sans-serif;
        background: var(--white);
        color: var(--black);
        line-height: 1.6;
        overflow-x: hidden;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--gray-100);
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--primary) 0%, #4a8b8b 100%);
        border-radius: 5px;
        border: 2px solid var(--gray-100);
      }

      /* ============================================
           HEADER
           ============================================ */
      .nav-header {
        background: white;
        border-bottom: 1px solid var(--gray-200);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px clamp(20px, 5vw, 50px);
      }

      .nav-logo {
        font-family: "SohneSchmal", sans-serif;
        font-size: 24px;
        font-weight: 600;
        color: var(--black);
        text-decoration: none;
        letter-spacing: -0.5px;
      }

      .nav-logo:hover {
        color: var(--primary);
      }

      .nav-home {
        font-size: 14px;
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
        padding: 10px 20px;
        border: 2px solid var(--primary);
        border-radius: 100px;
        transition: all 0.3s var(--ease-out-expo);
      }

      .nav-home:hover {
        background: var(--primary);
        color: var(--white);
        transform: translateY(-2px);
      }

      /* ============================================
           HERO
           ============================================ */
      .hero {
        position: relative;
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 140px 24px 80px;
        background: var(--black);
        overflow: hidden;
      }

      .hero-gradient {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 20% 50%,
            rgba(83, 137, 148, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 30%,
            rgba(106, 163, 176, 0.1) 0%,
            transparent 40%
          );
        animation: float 20s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -30px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.4) 0%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.6) 100%
        );
        z-index: 1;
      }

      .hero-content {
        position: relative;
        z-index: 2;
        max-width: 560px;
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 10px 20px;
        border-radius: 100px;
        margin-bottom: 28px;
      }

      .hero-badge-dot {
        width: 6px;
        height: 6px;
        background: var(--primary);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.2);
        }
      }

      .hero-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--white);
      }

      .hero-title {
        font-family: "SohneSchmal", sans-serif;
        font-size: clamp(40px, 8vw, 72px);
        font-weight: 400;
        line-height: 0.95;
        letter-spacing: -2px;
        color: var(--white);
        margin-bottom: 20px;
      }

      .hero-subtitle {
        font-size: clamp(16px, 2vw, 18px);
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 48px;
      }

      /* ============================================
           DOWNLOAD CARD
           ============================================ */
      .download-section {
        padding: 0 24px 100px;
        margin-top: -60px;
        position: relative;
        z-index: 3;
      }

      .download-card {
        max-width: 480px;
        margin: 0 auto;
        background: var(--white);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.12);
        border: 1px solid var(--gray-200);
        text-align: center;
      }

      .download-card-title {
        font-family: "SohneSchmal", sans-serif;
        font-size: 28px;
        font-weight: 400;
        color: var(--black);
        margin-bottom: 8px;
      }

      .download-card-subtitle {
        font-size: 14px;
        color: var(--gray-600);
        margin-bottom: 32px;
      }

      #qrcode {
        display: flex;
        justify-content: center;
        margin: 24px 0;
      }

      #qrcode canvas,
      #qrcode img {
        border-radius: 12px;
        padding: 16px;
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
      }

      .app-links {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 32px;
      }

      .app-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 16px 24px;
        border-radius: 14px;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.3s var(--ease-out-expo);
      }

      .app-link svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
      }

      .play-store {
        background: #34a853;
        color: white;
      }

      .play-store:hover {
        background: #2d8e47;
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(52, 168, 83, 0.35);
      }

      .app-store {
        background: var(--black);
        color: white;
      }

      .app-store:hover {
        background: var(--gray-800);
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      }

      /* ============================================
           FOOTER
           ============================================ */
      .gf-footer {
        --gf-teal: #5ea9ad;
        background: var(--black);
        color: #999;
        padding: 40px 24px 24px;
        text-align: center;
      }

      .gf-footer p {
        font-size: 14px;
        color: #888;
        margin-top: 16px;
      }

      .gf-footer .heart {
        color: #ff6b6b;
      }

      /* ============================================
           RESPONSIVE
           ============================================ */
      @media (max-width: 480px) {
        .hero {
          padding: 120px 20px 60px;
        }

        .download-card {
          padding: 36px 24px;
          border-radius: 20px;
        }

        .app-links {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav-header">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">GHAR!T</a>
        <a href="index.html" class="nav-home">← Home</a>
      </div>
    </header>

    <section class="hero">
      <div class="hero-gradient"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-badge">
          <span class="hero-badge-dot"></span>
          <span class="hero-label">Get the app</span>
        </div>
        <h1 class="hero-title">Download our app</h1>
        <p class="hero-subtitle">
          Premium laundry at your fingertips. Scan the QR code or tap below to
          get started.
        </p>
      </div>
    </section>

    <section class="download-section">
      <div class="download-card">
        <h2 class="download-card-title">Scan or tap to download</h2>
        <p class="download-card-subtitle">Works on iOS and Android</p>
        <div id="qrcode"></div>
        <div class="app-links">
          <a
            href="https://play.google.com/store/apps/details?id=com.gharitapp.gharitapp"
            class="app-link play-store"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg viewBox="0 0 24 24">
              <path
                d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.5,12.92 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"
              />
            </svg>
            Google Play
          </a>
          <a
            href="https://apps.apple.com/ng/app/ghar-t/id6752650388"
            class="app-link app-store"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg viewBox="0 0 24 24">
              <path
                d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
              />
            </svg>
            App Store
          </a>
        </div>
      </div>
    </section>

    <footer class="gf-footer">
      <p>
        © 2024 GHAR!T. Crafted with <span class="heart">💛</span> in Mumbai,
        India
      </p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      (function () {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        var isIOS =
          /iPad|iPhone|iPod|Mac|Macintosh/.test(userAgent) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        var isAndroid = /android/i.test(userAgent);
        var qrUrl = isIOS
          ? "https://apps.apple.com/ng/app/ghar-t/id6752650388"
          : "https://play.google.com/store/apps/details?id=com.gharitapp.gharitapp";

        // Forward mobile users directly to app store
        if (isIOS || isAndroid) {
          window.location.href = qrUrl;
        }

        var qrEl = document.getElementById("qrcode");
        if (qrEl && typeof QRCode !== "undefined") {
          new QRCode(qrEl, {
            text: qrUrl,
            width: 180,
            height: 180,
          });
        }
      })();
    </script>
  </body>
</html>
